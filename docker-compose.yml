services:
  postgres:
    image: postgres:16-alpine
    container_name: vrcoresched-postgres
    environment:
      POSTGRES_DB: vrcoresched
      POSTGRES_USER: vruser
      POSTGRES_PASSWORD: vrpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vrcoresched-redis
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: vrcoresched-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  postgres_data:
